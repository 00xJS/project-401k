name: Update S&P 500 Price Data

on:
  schedule:
    # 21:00 UTC weekdays = ~30 min after US market close (4 PM EST / 5 PM EDT)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch S&P 500 prices
        run: python scripts/fetch_sp500_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sp500-prices.json
          git diff --cached --quiet && echo "No new data — nothing to commit." || (
            git commit -m "chore: update S&P 500 price data $(date -u +%Y-%m-%d) [skip ci]" &&
            git pull --rebase &&
            git push
          )
